name: Multi-Job

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Give execution permission to Maven wrapper
        run: chmod +x ./mvnw

      - name: Run unit tests
        run: ./mvnw -B test


  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Give execution permission to Maven wrapper
        run: chmod +x ./mvnw

      - name: Run integration tests
        run: ./mvnw -B verify


  build-artifacts:
    name: Build JAR and JavaDoc
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Give execution permission to Maven wrapper
        run: chmod +x ./mvnw

      - name: Build JAR
        run: ./mvnw -B package -DskipTests

      - name: Generate JavaDoc
        run: ./mvnw -B javadoc:javadoc

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-app-jar
          path: target/*.jar

      - name: Upload JavaDoc artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-javadoc
          path: target/site/apidocs